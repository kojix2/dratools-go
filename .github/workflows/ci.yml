name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            go: "1.22.x"
          - os: ubuntu-latest
            go: "1.x"
          - os: macos-latest
            go: "1.x"
          - os: windows-latest
            go: "1.x"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Check formatting
        run: test -z "$(gofmt -l ./cmd ./internal)"

      - name: Check module files
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Test
        run: go test ./...

      - name: Build
        run: go build -o dratools ./cmd/dratools
